<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Demo Frontend</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <div class="container mx-auto p-8 mt-10 bg-white max-w-2xl rounded-xl shadow-lg">
        <h1 class="text-3xl font-bold mb-4 text-gray-900">Git Best Practices Demo</h1>
        <p class="mb-6 text-gray-600">This frontend fetches data from a separate API component.</p>

        <div class="flex items-center space-x-4">
            <button id="fetchButton" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-transform transform hover:scale-105">
                Fetch Data from API
            </button>
            <div id="loadingSpinner" class="hidden w-6 h-6 border-4 border-blue-500 border-dashed rounded-full animate-spin"></div>
        </div>


        <div id="apiResponse" class="mt-8 p-6 bg-gray-50 rounded-lg border border-gray-200 hidden">
            <h2 class="text-xl font-semibold mb-3">API Response:</h2>
            <pre class="bg-gray-900 text-white p-4 rounded-md overflow-x-auto"><code id="dataContainer"></code></pre>
        </div>

        <div id="errorBox" class="hidden mt-6 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg">
            <strong>Error:</strong> <span id="errorMessage"></span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
